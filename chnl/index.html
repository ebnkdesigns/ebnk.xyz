<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>polynive</title>
    <meta name="twitter:card" content="summary_large_image">
    <meta property="og:title" content="polynive" />
    <meta name="description"
        content="this is nive.">
    <meta property="og:description"
        content="this is nive." />
    <meta name="theme-color" content="#FF16C5" />
    <link rel="stylesheet" href="main.css">
    <link rel="icon" href="https://nive.live/assets/svg/nive-icon.svg">
    <script src="main.js" defer></script>
    <script src="modal.js" defer></script>
    <script src="carousel.js" defer></script>
</head>

<body>
    <div class="content">
        <div class="top-banner">
            <a href="https://nive.live" class="banner-link" target="_blank">
                <div class="logo-container">
                    <img src="https://nive.live/assets/svg/nive-icon.svg" alt="chnl.pilot" class="logo-icon">
                    <img src="nivefull.svg" alt="nive" class="logo-full">
                </div>
            </a>
        </div>
        <header>
            <picture>
                <img src="polynive.svg" alt="Logo" class="logo">
            </picture>
            <div class="nav-icons">
                <a class="icon_button" href="https://discord.gg/kyzBm93v6p"><svg xmlns="http://www.w3.org/2000/svg"
                        width="24" height="24" fill="currentColor" class="bi bi-discord" viewBox="0 0 16 16">
                        <path
                            d="M13.545 2.907a13.2 13.2 0 0 0-3.257-1.011.05.05 0 0 0-.052.025c-.141.25-.297.577-.406.833a12.2 12.2 0 0 0-3.658 0 8 8 0 0 0-.412-.833.05.05 0 0 0-.052-.025c-1.125.194-2.22.534-3.257 1.011a.04.04 0 0 0-.021.018C.356 6.024-.213 9.047.066 12.032q.003.022.021.037a13.3 13.3 0 0 0 3.995 2.02.05.05 0 0 0 .056-.019q.463-.63.818-1.329a.05.05 0 0 0-.01-.059l-.018-.011a9 9 0 0 1-1.248-.595.05.05 0 0 1-.02-.066l.015-.019q.127-.095.248-.195a.05.05 0 0 1 .051-.007c2.619 1.196 5.454 1.196 8.041 0a.05.05 0 0 1 .053.007q.121.1.248.195a.05.05 0 0 1-.004.085 8 8 0 0 1-1.249.594.05.05 0 0 0-.03.03.05.05 0 0 0 .003.041c.24.465.515.909.817 1.329a.05.05 0 0 0 .056.019 13.2 13.2 0 0 0 4.001-2.02.05.05 0 0 0 .021-.037c.334-3.451-.559-6.449-2.366-9.106a.03.03 0 0 0-.02-.019m-8.198 7.307c-.789 0-1.438-.724-1.438-1.612s.637-1.613 1.438-1.613c.807 0 1.45.73 1.438 1.613 0 .888-.637 1.612-1.438 1.612m5.316 0c-.788 0-1.438-.724-1.438-1.612s.637-1.613 1.438-1.613c.807 0 1.451.73 1.438 1.613 0 .888-.631 1.612-1.438 1.612" />
                    </svg></a>
                <!-- <a class="icon_button"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><rect width="24" height="24" fill="none"/><path fill="currentColor" d="M3 4h18v2H3zm0 7h18v2H3zm0 7h18v2H3z"/></svg></a> -->
            </div>
        </header>
        <div class="main">
            <div class="banner-carousel">
                <div class="carousel-track" id="carousel-track">
                </div>
                <div class="carousel-dots" id="carousel-dots">
                </div>
                <button class="carousel-prev" aria-label="Previous slide">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <button class="carousel-next" aria-label="Next slide">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>
            <div class="search-container">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="channel-search" placeholder="Search channels..." class="search-bar">
            </div>
            <div id="channel-list-wrapper">
                <div id="channel-list" data-item-container role="listbox" aria-label="Channels">
                    <p>loading... // <span style="color: #ff8fe3;">go to nive.live</span></p>
                </div>
                <div id="footer-container"></div>
            </div>
            <template data-channel-template>
                <div class="item" role="option" tabindex="-1">
                    <div class="thumbnail-container">
                        <img class="channel-thumbnail" channel-thumbnail src="">
                        <div class="viewer-count-chip">
                            <span class="status-dot"></span>
                            <span viewer-count-text>0</span>
                        </div>
                    </div>
                    <div class="channeldetails">
                        <img class="channelicon" channel-icon src="">
                        <div class="channelinfo">
                            <h1 channel-name></h1>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</body>

</html>
